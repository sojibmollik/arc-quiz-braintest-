<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Quiz • Economic OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.ethers.io/lib/ethers-6.13.5.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen text-white bg-gradient-to-br from-slate-950 to-slate-900">
  <div class="max-w-4xl mx-auto px-4 py-8">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-cyan-500 rounded-2xl flex items-center justify-center text-3xl font-bold text-black">A</div>
        <div>
          <h1 class="text-3xl font-bold">Arc Quiz</h1>
          <p class="text-cyan-400">Economic Operating System</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="dailyCheckIn()" class="flex items-center gap-2 px-5 py-3 bg-purple-600 hover:bg-purple-500 rounded-2xl font-medium transition">
          <i class="fa-solid fa-calendar-check"></i> Daily Check-in
        </button>
        <button onclick="showLeaderboard()" class="flex items-center gap-2 px-5 py-3 bg-amber-600 hover:bg-amber-500 rounded-2xl font-medium transition">
          <i class="fa-solid fa-trophy"></i> Leaderboard
        </button>
        <button onclick="connectWallet()" id="connect-btn" class="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-black font-semibold rounded-2xl transition">
          <i class="fa-solid fa-wallet"></i>
          <span id="wallet-text">Connect Wallet</span>
        </button>
      </div>
    </div>

    <div id="quiz-container"></div>

    <div class="flex justify-between items-center mt-8">
      <button onclick="prevQuestion()" id="prev-btn" class="flex items-center gap-2 px-6 py-3 bg-gray-800 hover:bg-gray-700 rounded-2xl font-medium">
        <i class="fa-solid fa-arrow-left"></i> Previous
      </button>
      <button onclick="nextQuestion()" id="next-btn" class="flex items-center gap-2 px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black rounded-2xl font-semibold">
        Next <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <button onclick="submitQuiz()" id="submit-btn" class="hidden w-full mt-8 py-5 bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold text-xl rounded-3xl">
      Submit & Save on Blockchain
    </button>
  </div>

  <!-- Results Modal -->
  <div id="results-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-slate-900 rounded-3xl max-w-2xl w-full mx-4 overflow-hidden">
      <div class="p-10 text-center border-b border-slate-700">
        <h2 class="text-4xl font-bold">Your Score</h2>
        <span id="score-display" class="text-8xl font-mono font-bold text-cyan-400 block my-4">0</span>
        <p id="score-message" class="text-xl"></p>
      </div>
      <div class="p-6 flex gap-4">
        <button onclick="restartQuiz()" class="flex-1 py-4 bg-gray-800 hover:bg-gray-700 rounded-2xl font-semibold">Restart Quiz</button>
        <button onclick="window.location.reload()" class="flex-1 py-4 bg-white text-black hover:bg-gray-200 rounded-2xl font-semibold">Play Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
